<!-- Telegram Popup -->
<div
  id="telegramPopup"
  class="fixed inset-0 flex items-center justify-center z-50 hidden"
>
  <div
    class="absolute inset-0 bg-black/80 backdrop-blur-sm"
    onclick="closeTelegramPopup()"
  ></div>
  <div
    class="relative bg-brand-dark border border-brand/30 rounded-2xl max-w-md w-full mx-4 p-8 shadow-2xl shadow-brand/20"
  >
    <button
      onclick="closeTelegramPopup()"
      class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
    <div class="flex justify-center mb-6">
      <div
        class="w-20 h-20 bg-brand/10 rounded-full flex items-center justify-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-8 h-8 text-brand group-hover:text-black transition-colors"
          viewBox="0 0 16 16"
        >
          <path
            d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.287 5.906q-1.168.486-4.666 2.01-.567.225-.595.442c-.03.243.275.339.69.47l.175.055c.408.133.958.288 1.243.294q.39.01.868-.32 3.269-2.206 3.374-2.23c.05-.012.12-.026.166.016s.042.12.037.141c-.03.129-1.227 1.241-1.846 1.817-.193.18-.33.307-.358.336a8 8 0 0 1-.188.186c-.38.366-.664.64.015 1.088.327.216.589.393.85.571.284.194.568.387.936.629q.14.092.27.187c.331.236.63.448.997.414.214-.02.435-.22.547-.82.265-1.417.786-4.486.906-5.751a1.41.4 0 0 0-.013-.315.34.34 0 0 0-.114-.217.53.53 0 0 0-.31-.093c-.3.005-.763.166-2.984 1.09"
            fill="currentColor"
          />
        </svg>
      </div>
    </div>
    <h3 class="text-2xl font-bold text-center text-white mb-2">
      Join Our Telegram
    </h3>
    <p class="text-gray-400 text-center mb-6">
      Connect with fellow members, get updates, and be part of our community!
    </p>
    <div class="bg-brand-accent/20 rounded-xl p-4 mb-6 border border-white/5">
      <div class="flex items-center gap-3 mb-3">
        <svg class="w-5 h-5 text-brand" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.04-.48-.82-.27-1.47-.42-1.42-.88.03-.24.27-.49.74-.75 2.87-1.25 4.78-2.08 5.74-2.48 2.73-1.13 3.3-1.33 3.67-1.33.08 0 .26.02.38.12.1.08.13.19.14.27-.01.1 0 .26 0 .26z"
          />
        </svg>
        <span class="text-white font-semibold">@ethiobusinessclub</span>
      </div>
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-brand">link</span>
        <a href="https://t.me/ethiobusinessclub" class="text-brand truncate"
          >t.me/ethiobusinessclub</a
        >
      </div>
    </div>
    <div class="flex flex-col sm:flex-row gap-3">
      <a
        href="https://t.me/ethiobusinessclub"
        target="_blank"
        class="flex-1 bg-brand text-black text-center font-bold py-3 rounded-custom hover:bg-white transition-all shadow-[0_0_20px_rgba(37,244,89,0.3)]"
        >Open Telegram</a
      >
      <button
        onclick="closeTelegramPopup()"
        class="flex-1 border border-white/20 text-white font-bold py-3 rounded-custom hover:border-brand/50 transition-colors"
      >
        Maybe Later
      </button>
    </div>
    <div class="mt-6 pt-6 border-t border-white/10 text-center">
      <p class="text-sm text-gray-500 mb-2">Or scan to join:</p>
      <div
        class="w-24 h-24 mx-auto bg-white/5 rounded-lg flex items-center justify-center border border-white/10"
      >
        <img src="./icons/qr_code.png" alt="qr code image" />
      </div>
    </div>
  </div>
</div>
